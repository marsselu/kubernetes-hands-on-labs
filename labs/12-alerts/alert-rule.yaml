apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pod-down
  labels:
    release: kube-prometheus
spec:
  groups:
  - name: pod-alerts
    rules:
    - alert: PodDown
      expr: kube_pod_status_phase{phase="Running"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Pod is down"
        description: "A pod is not running"